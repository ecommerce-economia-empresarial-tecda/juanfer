# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: React 19 (^19.2.7), Vite 8 (^8.1.1), npm, JavaScript (ES6+, JSX), Vitest (^4.1.10), React Testing Library (^16.3.2)
  Architecture: Client-side single-page app (SPA) with entrypoint src/main.jsx and main component src/App.jsx.
  Testing: Vitest for unit/component testing with React Testing Library.
  Style: ESLint 10 (^10.6.0) using standard configuration (eslint.config.js).

testing:
  test_runner: "vitest"
  test_layers: ["unit", "component"]
  coverage: "vitest"
  linter: "eslint"
  type_checker: null
  formatter: "eslint"
  strict_tdd: true

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    guidelines:
      - Follow existing code patterns
    tdd: true
    test_command: "npm run test"
  verify:
    test_command: "npm run test"
    build_command: "npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
