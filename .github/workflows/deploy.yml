name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npx firebase-tools deploy --only hosting --project juanfer-shop-2026
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
